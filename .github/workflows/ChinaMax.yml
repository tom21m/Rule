name: SplitRules ChinaMax

on:
  schedule:
    # 每天北京时间 04:30
    - cron: "30 4 * * *"
      timezone: "Asia/Shanghai"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: SplitRulesChinaMax
  cancel-in-progress: true

# 修改源地址、每份行数或输出文件名时，只需调整这里。
env:
  SOURCE_URL: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/ChinaMaxNoIP/ChinaMaxNoIP_All_No_Resolve.list"
  LINES_PER_FILE: "50000"
  OUTPUT_DIR: "."
  OUTPUT_PREFIX: "ChinaMax-"
  OUTPUT_SUFFIX: ".list"
  HASH_FILE: ".ChinaMax.sha256"
  MIN_RULES: "50001"

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download, clean and split
        shell: bash
        run: |
          set -euo pipefail

          if ! [[ "$LINES_PER_FILE" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::LINES_PER_FILE 必须是大于 0 的整数"
            exit 1
          fi

          if ! [[ "$MIN_RULES" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::MIN_RULES 必须是大于 0 的整数"
            exit 1
          fi

          if [[ "$OUTPUT_PREFIX" == */* || "$OUTPUT_SUFFIX" == */* ]]; then
            echo "::error::OUTPUT_PREFIX 和 OUTPUT_SUFFIX 不能包含斜杠"
            exit 1
          fi

          tmp_dir=$(mktemp -d)
          trap 'rm -rf "$tmp_dir"' EXIT

          source_file="$tmp_dir/source.list"
          clean_file="$tmp_dir/clean.list"
          split_dir="$tmp_dir/split"
          mkdir -p "$split_dir" "$OUTPUT_DIR"

          echo "下载源文件..."
          curl \
            --location \
            --fail \
            --show-error \
            --silent \
            --retry 3 \
            --retry-all-errors \
            --connect-timeout 20 \
            --max-time 180 \
            "$SOURCE_URL" \
            --output "$source_file"

          echo "删除注释和空行..."
          sed 's/\r$//' "$source_file" |
            awk '
              {
                gsub(/^[ \t]+|[ \t]+$/, "")
                if ($0 != "" &&
                    $0 !~ /^#/ &&
                    $0 !~ /^\/\// &&
                    $0 !~ /^;/) {
                  print
                }
              }
            ' > "$clean_file"

          total=$(wc -l < "$clean_file" | tr -d '[:space:]')
          echo "有效规则数量: $total"

          if (( total < MIN_RULES )); then
            echo "::error::有效规则数量 $total 少于最低要求 $MIN_RULES"
            exit 1
          fi

          echo "按每份 $LINES_PER_FILE 行生成分片..."
          awk \
            -v lines="$LINES_PER_FILE" \
            -v dir="$split_dir" \
            -v prefix="$OUTPUT_PREFIX" \
            -v suffix="$OUTPUT_SUFFIX" '
              {
                part = int((NR - 1) / lines) + 1
                file = dir "/" prefix part suffix
                print > file
                if (NR % lines == 0) {
                  close(file)
                }
              }
            ' "$clean_file"

          expected_parts=$(( (total + LINES_PER_FILE - 1) / LINES_PER_FILE ))
          generated_total=0

          for (( part = 1; part <= expected_parts; part++ )); do
            file="$split_dir/$OUTPUT_PREFIX$part$OUTPUT_SUFFIX"

            if [[ ! -s "$file" ]]; then
              echo "::error::分片不存在或为空: $file"
              exit 1
            fi

            count=$(wc -l < "$file" | tr -d '[:space:]')
            if (( count > LINES_PER_FILE )); then
              echo "::error::分片 $part 超过 $LINES_PER_FILE 行"
              exit 1
            fi

            generated_total=$((generated_total + count))
            echo "第 $part 份: $count 行"
          done

          if (( generated_total != total )); then
            echo "::error::分片总行数 $generated_total 与有效规则数 $total 不一致"
            exit 1
          fi

          echo "替换旧分片..."
          shopt -s nullglob
          for file in "$OUTPUT_DIR"/"$OUTPUT_PREFIX"*"$OUTPUT_SUFFIX"; do
            name=${file##*/}
            number=${name#"$OUTPUT_PREFIX"}
            number=${number%"$OUTPUT_SUFFIX"}

            # 只删除本工作流生成的纯数字编号分片，避免误删相似文件。
            if [[ "$number" =~ ^[1-9][0-9]*$ ]]; then
              rm -f -- "$file"
            fi
          done

          for (( part = 1; part <= expected_parts; part++ )); do
            mv \
              "$split_dir/$OUTPUT_PREFIX$part$OUTPUT_SUFFIX" \
              "$OUTPUT_DIR/$OUTPUT_PREFIX$part$OUTPUT_SUFFIX"
          done

          sha256sum "$source_file" | awk '{print $1}' > "$HASH_FILE"
          echo "已生成 $expected_parts 个分片"

      - name: Commit changes
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 同时加入现有分片和已删除的旧分片，确保分片数量减少时也能提交删除。
          mapfile -t tracked_files < <(
            git ls-files -- "$OUTPUT_DIR/$OUTPUT_PREFIX*$OUTPUT_SUFFIX"
          )

          shopt -s nullglob
          current_files=(
            "$OUTPUT_DIR"/"$OUTPUT_PREFIX"*"$OUTPUT_SUFFIX"
          )

          git add -A -- "$HASH_FILE" "${tracked_files[@]}" "${current_files[@]}"

          if git diff --cached --quiet; then
            echo "规则没有变化，无需提交"
            exit 0
          fi

          git commit -m "SplitRules"
          git push
